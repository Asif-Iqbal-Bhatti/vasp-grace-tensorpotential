# =============================================================================
#  gracemaker input.yaml — EXAMPLE: Fine-tune GRACE-2L-OMAT-medium
#
#  Start from a foundation model pre-trained on OMat24, fine-tune on
#  your own VASP DRX cathode data.
#
#  Usage:
#    grace_models download GRACE-2L-OMAT-medium   # download foundation model
#    gracemaker finetune_input.yaml
# =============================================================================

seed: 1
fit_type: finetune
foundation_model: GRACE-2L-OMAT-medium

# Elements: must be a subset of the foundation model's element set.
# GRACE-2L-OMAT covers the full periodic table.
elements: [Li, Ni, Mn, Co, O]

dataset:
  filename: collected.pkl.gz
  energy_key: REF_energy
  forces_key: REF_forces
  virial_key: REF_virial
  test_size: 0.05

fit:
  optimizer: Adam
  loss:
    type: huber
    huber_delta: 0.01
    energy_weight: 16.0
    forces_weight: 32.0
    stress_weight: 128.0
  batch_size: 16
  learning_rate: 0.0001
  target_total_updates: 10000
  # Switch loss weights at mid-training to improve energy accuracy
  switch_weights:
    at_update: 5000
    energy_weight: 32.0
    forces_weight: 32.0
    stress_weight: 128.0
