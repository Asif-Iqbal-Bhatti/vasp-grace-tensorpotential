# =============================================================================
#  gracemaker input.yaml — EXAMPLE: GRACE-2L from scratch
#  For a HE-DRX cathode system (Li-Ni-Mn-Co-O)
#
#  Usage:
#    gracemaker input.yaml
#    tensorboard --logdir seed/1/
# =============================================================================

seed: 1
cutoff: 6.0
elements: [Li, Ni, Mn, Co, O]

dataset:
  filename: collected.pkl.gz
  energy_key: REF_energy
  forces_key: REF_forces
  virial_key: REF_virial
  test_size: 0.05

model:
  preset: GRACE_2LAYER_latest
  complexity: medium

fit:
  optimizer: Adam
  loss:
    type: huber
    huber_delta: 0.01
    energy_weight: 16.0
    forces_weight: 32.0
    stress_weight: 128.0
  batch_size: 4
  learning_rate: 0.0002
  target_total_updates: 25000
